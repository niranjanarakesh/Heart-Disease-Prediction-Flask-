<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="gradient-1"></div>
    <div class="gradient-2"></div>
    <div class="gradient-3"></div>

    <div class="container">

        <h1>🫀 Heart Disease Predictor</h1>
        <p class="subtitle">
            Predict heart disease risk using clinical and lifestyle factors
        </p>

        <form action="/predict" method="POST">

            <div class="section-title">Personal Information</div>

            <input type="number" name="age" placeholder="Age" required>

            <select name="gender" required>
                <option value="">Gender</option>
                <option value="1">Male</option>
                <option value="0">Female</option>
            </select>

            <select name="family_history" required>
                <option value="">Family History</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <div></div>

            <div class="section-title">Health Metrics</div>

            <input type="number" name="cholesterol" placeholder="Cholesterol" required>

            <input type="number" name="blood_pressure" placeholder="Blood Pressure" required>

            <input type="number" name="heart_rate" placeholder="Heart Rate" required>

            <input type="number" step="0.1" name="blood_sugar" placeholder="Blood Sugar" required>

            <div class="section-title">Lifestyle Factors</div>

            <select name="smoking" required>
                <option value="">Smoking Status</option>
                <option value="0">Current</option>
                <option value="1">Former</option>
                <option value="2">Never</option>
            </select>

            <select name="alcohol" required>
                <option value="">Alcohol Intake</option>
                <option value="0">Heavy</option>
                <option value="1">Moderate</option>
            </select>

            <input type="number" step="0.1" name="exercise_hours" placeholder="Exercise Hours" required>

            <input type="number" step="0.1" name="stress_level" placeholder="Stress Level" required>

            <div class="section-title">Risk Factors</div>

            <select name="diabetes" required>
                <option value="">Diabetes</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="obesity" required>
                <option value="">Obesity</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="angina" required>
                <option value="">Exercise Induced Angina</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>

            <select name="chest_pain" required>
                <option value="">Chest Pain Type</option>
                <option value="0">Asymptomatic</option>
                <option value="1">Atypical Angina</option>
                <option value="2">Non-anginal Pain</option>
                <option value="3">Typical Angina</option>
            </select>

            <button type="submit">Predict Risk</button>

        </form>

        {% if prediction_text %}
        <div class="result-card">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>

</body>

</html>
